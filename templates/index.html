<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rProxy Dashboard v3.0 | Premium Edition</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* BASE & THEME */
        :root {
            --bg-color: #030508;
            --accent-main: #00f2ff;
            --accent-success: #00ffa3;
            --accent-danger: #ff3e6d;
            --accent-purple: #c084fc;
            --glass-bg: rgba(15, 23, 42, 0.4);
            --glass-border: rgba(255, 255, 255, 0.06);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --card-shadow: 0 8px 32px -4px rgba(0, 0, 0, 0.5);
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 242, 255, 0.03) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(192, 132, 252, 0.03) 0%, transparent 40%);
        }

        /* LAYOUT */
        .app-container {
            width: 100%;
            max-width: 1440px;
            padding: 32px;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 32px;
        }

        @media (max-width: 1100px) {
            .app-container { grid-template-columns: 1fr; padding: 20px; }
        }

        /* REUSABLE GLASS COMPONENT */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--card-shadow);
            transition: var(--transition);
        }

        /* SIDEBAR */
        .sidebar { display: flex; flex-direction: column; gap: 24px; }
        .branding {
            padding: 32px;
            text-align: left;
            position: relative;
            overflow: hidden;
            border-bottom: 4px solid var(--accent-main);
        }
        .branding h1 { font-size: 28px; font-weight: 900; letter-spacing: -1px; margin-bottom: 4px; }
        .branding h1 span { color: var(--accent-main); text-shadow: 0 0 20px rgba(0, 242, 255, 0.3); }
        .branding p { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 2.5px; color: var(--text-dim); }

        .sys-info { padding: 24px; }
        .stat-card {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px; margin-bottom: 12px; border-radius: 16px;
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.03);
            transition: var(--transition);
        }
        .stat-card:hover { background: rgba(255, 255, 255, 0.04); border-color: rgba(255, 255, 255, 0.08); }
        .stat-label { display: flex; align-items: center; gap: 10px; font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--text-dim); }
        .stat-value { font-family: monospace; font-size: 14px; color: #fff; font-weight: 900; }

        /* MAIN CONTENT */
        .main-content { display: flex; flex-direction: column; gap: 32px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; }
        
        .search-field { position: relative; flex: 1; max-width: 480px; }
        .search-field input {
            width: 100%; padding: 18px 24px 18px 56px;
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border);
            border-radius: 20px; color: #fff; font-size: 14px; outline: none; transition: var(--transition);
        }
        .search-field i { position: absolute; left: 24px; top: 18px; color: var(--text-dim); }
        .search-field input:focus { border-color: var(--accent-main); background: rgba(255, 255, 255, 0.06); box-shadow: 0 0 30px rgba(0, 242, 255, 0.05); }

        .btn-glow {
            padding: 18px 36px; border-radius: 20px; border: none; font-weight: 800; cursor: pointer;
            text-transform: uppercase; font-size: 13px; display: flex; align-items: center; gap: 12px;
            background: var(--accent-main); color: #000; box-shadow: 0 8px 20px rgba(0, 242, 255, 0.3);
            transition: var(--transition);
        }
        .btn-glow:hover { transform: translateY(-3px); box-shadow: 0 12px 28px rgba(0, 242, 255, 0.4); }
        .btn-glow:active { transform: translateY(0); scale: 0.98; }

        /* GRID SYSTEM */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 24px;
        }

        .service-card {
            padding: 28px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .service-card::after {
            content: ''; position: absolute; top:0; right:0; width: 60px; height: 60px;
            background: linear-gradient(135deg, transparent 50%, var(--accent-color) 50%);
            opacity: 0.1;
        }
        
        .svc-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .svc-visual { display: flex; align-items: center; gap: 20px; }
        .svc-icon-box {
            width: 64px; height: 64px; border-radius: 20px;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.06);
            display: flex; align-items: center; justify-content: center;
            color: var(--accent-color); transition: var(--transition);
        }
        .service-card:hover .svc-icon-box { transform: scale(1.1) rotate(-5deg); border-color: var(--accent-color); box-shadow: 0 0 20px var(--accent-glow); }
        
        .svc-name-group h3 { font-size: 20px; font-weight: 800; margin-bottom: 6px; letter-spacing: -0.5px; }
        .status-badge {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 6px 12px; border-radius: 99px; font-size: 9px; font-weight: 900;
            text-transform: uppercase; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05);
        }
        .status-badge .dot { width: 6px; height: 6px; border-radius: 50%; }
        .status-badge.online { color: var(--accent-success); }
        .status-badge.online .dot { background: var(--accent-success); box-shadow: 0 0 10px var(--accent-success); }
        .status-badge.offline { color: var(--accent-danger); }
        .status-badge.offline .dot { background: var(--accent-danger); }

        .svc-meta { display: flex; flex-direction: column; gap: 8px; }
        .meta-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 18px; border-radius: 16px; background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.03);
        }
        .meta-label { font-size: 10px; font-weight: 800; text-transform: uppercase; color: var(--text-dim); display: flex; align-items: center; gap: 8px; }
        .meta-value { font-family: monospace; font-size: 13px; font-weight: 700; color: var(--text-main); }

        .svc-actions { display: flex; gap: 12px; padding-top: 8px; }
        .btn-action {
            flex: 1; height: 48px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.05);
            background: rgba(255,255,255,0.02); color: var(--text-dim); cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: var(--transition);
        }
        .btn-action:hover { background: rgba(255, 255, 255, 0.08); color: #fff; transform: translateY(-2px); }
        .btn-action.primary { flex: 2; gap: 10px; font-size: 10px; font-weight: 900; text-transform: uppercase; border-color: rgba(255,255,255,0.1); }
        .btn-action.primary.on:hover { background: var(--accent-success); color: #000; border-color: var(--accent-success); }
        .btn-action.primary.off:hover { background: var(--accent-danger); color: #000; border-color: var(--accent-danger); }
        .btn-action.danger:hover { color: var(--accent-danger); border-color: rgba(255, 62, 109, 0.3); }

        /* UTILITIES */
        .pulse { animation: pulseAnim 2s infinite; }
        @keyframes pulseAnim { 0% { opacity: 0.6; } 50% { opacity: 0.3; } 100% { opacity: 0.6; } }

        .loading-state { grid-column: 1 / -1; display: flex; flex-direction: column; align-items: center; padding: 100px 0; color: var(--text-dim); gap: 20px; }
        .shimmer { background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent); background-size: 200% 100%; animation: shimmer 2s infinite; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    </style>
</head>
<body class="custom-scrollbar">
    <div class="app-container">
        
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="glass branding">
                <p>Advanced Control</p>
                <h1>rProxy <span>v3.0</span></h1>
                <div style="position: absolute; bottom: -20px; right: -20px; opacity: 0.05; transform: rotate(-15deg);"><i data-lucide="zap" style="width: 120px; height: 120px;"></i></div>
            </div>

            <div class="glass sys-info">
                <div id="system-stats" hx-get="/api/system" hx-trigger="load, every 10s">
                    <!-- Stat Loading State -->
                    <div class="shimmer" style="height: 50px; border-radius: 16px; margin-bottom: 12px;"></div>
                    <div class="shimmer" style="height: 50px; border-radius: 16px; margin-bottom: 12px;"></div>
                    <div class="shimmer" style="height: 50px; border-radius: 16px;"></div>
                </div>
                
                <div style="margin-top: 32px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                    <button class="btn-action" title="SSL Certificates Management">
                        <i data-lucide="shield" style="width:18px"></i>
                    </button>
                    <button class="btn-action" title="System Settings">
                        <i data-lucide="settings" style="width:18px"></i>
                    </button>
                </div>
            </div>

            <div class="glass" style="padding: 24px; background: linear-gradient(to bottom right, rgba(0, 242, 255, 0.05), transparent);">
                <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 16px;">
                    <div style="width: 32px; height: 32px; border-radius: 8px; background: rgba(0, 242, 255, 0.1); display: flex; align-items: center; justify-content: center; color: var(--accent-main);"><i data-lucide="info" style="width: 16px;"></i></div>
                    <span style="font-size: 11px; font-weight: 800; text-transform: uppercase;">Status Check</span>
                </div>
                <p style="font-size: 12px; line-height: 1.6; color: var(--text-dim);">Все системы работают штатно. SSH-туннели удерживаются в активном состоянии.</p>
            </div>
        </aside>

        <!-- MAIN -->
        <main class="main-content">
            <header class="top-bar">
                <div class="search-field">
                    <i data-lucide="search"></i>
                    <input type="text" placeholder="Поиск по названию или домену...">
                </div>
                
                <button class="btn-glow">
                    <i data-lucide="plus-circle"></i>
                    <span>Добавить сервис</span>
                </button>
            </header>

            <div id="services-grid" class="dashboard-grid" hx-get="/api/services" hx-trigger="load, every 5s">
                <!-- Grid Loading State -->
                <div class="loading-state">
                    <i data-lucide="loader-2" class="pulse" style="width: 48px; height: 48px; color: var(--accent-main)"></i>
                    <p style="font-weight: 600; letter-spacing: 1px; text-transform: uppercase; font-size: 11px;">Синхронизация конфигураций...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- LOG VIEWER MODAL (Hidden by default) -->
    <div id="log-modal" style="display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; padding: 40px;">
        <div class="glass" style="width: 100%; max-width: 1000px; height: 100%; max-height: 700px; display: flex; flex-direction: column; overflow: hidden; border-color: rgba(255,255,255,0.1);">
            <div style="padding: 24px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center;">
                <div style="display: flex; align-items: center; gap: 16px;">
                    <i data-lucide="file-text" style="color: var(--accent-main);"></i>
                    <h2 style="font-size: 18px; font-weight: 800;" id="log-title">Service Logs</h2>
                </div>
                <button onclick="document.getElementById('log-modal').style.display='none'" class="btn-action" style="width: 40px; height: 40px; border-radius: 12px;"><i data-lucide="x"></i></button>
            </div>
            <div id="log-content" style="flex: 1; padding: 24px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #a4b1cd; overflow-y: auto; background: #010204;">
                <!-- Logs will stream here -->
                <p>> Waiting for data...</p>
            </div>
        </div>
    </div>

    <script>
        let logInterval = null;

        document.body.addEventListener('htmx:afterOnLoad', function(evt) {
            lucide.createIcons();
            // Если обновился список сервисов, и модалка открыта - ничего не делаем
        });
        
        function showLogs(name) {
            const modal = document.getElementById('log-modal');
            const title = document.getElementById('log-title');
            const content = document.getElementById('log-content');
            
            title.innerText = `Terminal Logs: ${name}`;
            modal.style.display = 'flex';
            content.innerHTML = '<p class="pulse">> Connecting to tunnel stream...</p>';
            
            if (logInterval) clearInterval(logInterval);
            
            const fetchLogs = async () => {
                try {
                    const response = await fetch(`/api/logs/${name}`);
                    const text = await response.text();
                    content.innerHTML = text;
                    content.scrollTop = content.scrollHeight;
                } catch (e) {
                    content.innerHTML = '<p style="color: var(--accent-danger)">! Connection Error</p>';
                }
            };
            
            fetchLogs();
            logInterval = setInterval(fetchLogs, 3000);
            
            // Закрытие при клике по фону
            modal.onclick = (e) => {
                if (e.target === modal) {
                    modal.style.display = 'none';
                    if (logInterval) clearInterval(logInterval);
                }
            };
        }
        
        lucide.createIcons();
    </script>
</body>
</html>
