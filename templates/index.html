<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, vertical-align=middle">
    <title>rProxy Premium Dashboard</title>
    <style>
        :root {
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.5);
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.4);
        }

        @keyframes mesh {
            0% { transform: translate(0, 0); }
            50% { transform: translate(-5%, 5%); }
            100% { transform: translate(0, 0); }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Animated Mesh Background */
        .mesh-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background: radial-gradient(at 0% 0%, #0a1128 0%, transparent 50%),
                        radial-gradient(at 100% 100%, #1a0a28 0%, transparent 50%);
        }

        .mesh-bg::after {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            top: -25%;
            left: -25%;
            background: radial-gradient(circle at 20% 30%, rgba(0, 242, 255, 0.05) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(192, 132, 252, 0.05) 0%, transparent 40%);
            filter: blur(80px);
            animation: mesh 20s ease-in-out infinite;
        }

        .container {
            max-width: 100%;
            width: 100%;
            padding: 20px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 30px;
            padding: 10px 0;
        }

        .logo-group h1 {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .version-badge {
            font-size: 10px;
            font-weight: 800;
            padding: 2px 8px;
            background: var(--accent);
            color: #000;
            border-radius: 4px;
            margin-left: 10px;
            vertical-align: middle;
        }

        .stats-grid {
            display: grid;
            grid-template-cols: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 16px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .stat-card .label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-card .value {
            font-size: 24px;
            font-weight: 800;
        }

        .section-title {
            font-size: 14px;
            font-weight: 800;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .services-list {
            display: grid;
            grid-template-cols: 1fr;
            gap: 16px;
        }

        .service-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 20px;
            transition: transform 0.3s ease, border-color 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .service-card:active {
            transform: scale(0.98);
        }

        .service-card.online {
            border-color: rgba(0, 242, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.05);
        }

        .svc-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .svc-info h3 {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 100px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            background: rgba(255, 255, 255, 0.05);
        }

        .status-pill.online {
            color: #00f2ff;
            background: rgba(0, 242, 255, 0.1);
        }

        .svc-details {
            display: grid;
            grid-template-cols: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .detail-item .d-label {
            font-size: 10px;
            color: var(--text-dim);
            margin-bottom: 4px;
        }

        .detail-item .d-value {
            font-size: 13px;
            font-weight: 600;
            font-family: 'Monaco', monospace;
        }

        .svc-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 14px;
            border: none;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-main {
            background: var(--accent);
            color: #000;
        }

        .btn-stop {
            background: rgba(255, 69, 58, 0.1);
            color: #ff453a;
            border: 1px solid rgba(255, 69, 58, 0.2);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text);
        }

        /* Floating Add Button */
        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: var(--accent);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px var(--accent-glow);
            z-index: 100;
            border: none;
        }

        /* Loading Animation */
        .loader {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive Mobile */
        @media (max-width: 480px) {
            .logo-group h1 { font-size: 24px; }
            .container { padding: 15px; }
        }
    </style>
</head>
<body>
    <div class="mesh-bg"></div>
    
    <div class="container">
        <header>
            <div class="logo-group">
                <h1>rProxy Dashboard<span class="version-badge" id="app-version">v5.0</span></h1>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="label">Туннели</span>
                <span class="value" id="stat-services">-</span>
            </div>
            <div class="stat-card">
                <span class="label">Онлайн</span>
                <span class="value" id="stat-online" style="color: var(--accent)">-</span>
            </div>
        </div>

        <div class="section-title">
            <span>Ваши сервисы</span>
            <button onclick="refreshData()" class="btn-outline" style="padding: 4px 8px; border-radius: 8px; font-size: 10px;">Обновить</button>
        </div>

        <div class="services-list" id="services-container">
            <!-- Скелет загрузки -->
            <div style="padding: 40px; text-align: center; color: var(--text-dim)">
                <div class="loader" style="margin: 0 auto 10px;"></div>
                Загрузка данных...
            </div>
        </div>
    </div>

    <button class="fab" onclick="alert('Добавление скоро появится в v5.1')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    </button>

    <script>
        async function fetchData() {
            try {
                const statsRes = await fetch('/api/stats');
                const stats = await statsRes.json();
                document.getElementById('stat-services').innerText = stats.services;
                document.getElementById('stat-online').innerText = stats.online;
                document.getElementById('app-version').innerText = 'v' + stats.version;

                const svcRes = await fetch('/api/services');
                const data = await svcRes.json();
                renderServices(data.services);
            } catch (err) {
                console.error(err);
                document.getElementById('services-container').innerHTML = '<div style="color: #ff453a; padding: 20px; text-align: center;">Ошибка связи с роутером</div>';
            }
        }

        function renderServices(services) {
            const container = document.getElementById('services-container');
            if (services.length === 0) {
                container.innerHTML = '<div style="padding: 40px; text-align: center; color: var(--text-dim)">Нет активных сервисов</div>';
                return;
            }

            container.innerHTML = services.map(s => `
                <div class="service-card ${s.status === 'online' ? 'online' : ''}">
                    <div class="svc-header">
                        <div class="svc-info">
                            <div class="status-pill ${s.status === 'online' ? 'online' : ''}">${s.status === 'online' ? '● В сети' : '○ Оффлайн'}</div>
                            <h3>${s.name}</h3>
                        </div>
                    </div>
                    <div class="svc-details">
                        <div class="detail-item">
                            <div class="d-label">Локальный порт</div>
                            <div class="d-value">${s.target.split(':')[1]}</div>
                        </div>
                        <div class="detail-item">
                            <div class="d-label">Внешний порт</div>
                            <div class="d-value" style="color: var(--accent)">${s.ext_port}</div>
                        </div>
                    </div>
                    <div class="svc-actions">
                        ${s.status === 'online' 
                            ? `<button class="btn btn-stop" onclick="action('${s.id}', 'stop')">Стоп</button>`
                            : `<button class="btn btn-main" onclick="action('${s.id}', 'start')">Запуск</button>`
                        }
                        <button class="btn btn-outline" onclick="action('${s.id}', 'restart')">🔄</button>
                    </div>
                </div>
            `).join('');
        }

        async function action(name, act) {
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = '...';
            btn.disabled = true;
            
            try {
                await fetch(\`/api/action/\${name}/\${act}\`, { method: 'POST' });
                setTimeout(fetchData, 2000); // Даем время скрипту отработать
            } catch (err) {
                alert('Ошибка выполнения команды');
            } finally {
                btn.disabled = false;
                btn.innerText = originalText;
            }
        }

        function refreshData() {
            fetchData();
        }

        fetchData();
        setInterval(fetchData, 10000); // Обновление раз в 10 сек
    </script>
</body>
</html>
