<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rProxy Dashboard | Python Edition</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --neon-cyan: #00f2ff;
            --neon-purple: #bc13fe;
            --neon-emerald: #00ff88;
        }

        body {
            background-color: #05070a;
            color: #fff;
            font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(0, 242, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(188, 19, 254, 0.05) 0%, transparent 50%);
            min-height: 100vh;
        }

        .neon-glass {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.02) 100%);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            transition: all 0.3s ease;
        }

        .neon-border-cyan:hover { border-color: rgba(0, 242, 255, 0.5); box-shadow: 0 0 20px rgba(0, 242, 255, 0.1); }
        .neon-border-emerald:hover { border-color: rgba(0, 255, 136, 0.5); box-shadow: 0 0 20px rgba(0, 255, 136, 0.1); }
        .neon-border-purple:hover { border-color: rgba(188, 19, 254, 0.5); box-shadow: 0 0 20px rgba(188, 19, 254, 0.1); }

        .status-dot { width: 8px; height: 8px; border-radius: 9999px; position: relative; }
        .online-dot { background-color: var(--neon-emerald); }
        .online-dot::after {
            content: ''; position: absolute; inset: -4px; border-radius: 9999px;
            background-color: var(--neon-emerald); opacity: 0.4; filter: blur(4px);
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        .offline-dot { background-color: #ff3e3e; }

        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.1; } }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .btn-action {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.75rem;
            border-radius: 0.75rem;
            transition: all 0.2s;
        }
        .btn-action:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-2px); }
        .btn-action:active { transform: translateY(0); scale: 0.95; }
    </style>
</head>
<body class="p-4 md:p-8 custom-scrollbar">
    <div class="max-w-[1400px] mx-auto grid grid-cols-1 lg:grid-cols-[320px_1fr] gap-8">
        
        <!-- Sidebar -->
        <aside class="space-y-6">
            <div class="neon-glass p-6 neon-border-cyan relative overflow-hidden">
                <div class="flex items-center gap-3 mb-8">
                    <div class="w-12 h-12 bg-cyan-500/20 rounded-2xl flex items-center justify-center text-[#00f2ff] shadow-lg shadow-cyan-500/20">
                        <i data-lucide="zap" class="w-7 h-7"></i>
                    </div>
                    <div>
                        <h1 class="text-2xl font-black tracking-tighter">rProxy <span class="text-[#00f2ff]">PY</span></h1>
                        <p class="text-[10px] uppercase tracking-[0.2em] font-bold text-gray-500">Efficient Control</p>
                    </div>
                </div>

                <div id="system-stats" hx-get="/api/system" hx-trigger="load, every 10s" class="space-y-4">
                    <!-- Загрузка статистики... -->
                    <div class="animate-pulse space-y-3">
                        <div class="h-10 bg-white/5 rounded-xl"></div>
                        <div class="h-10 bg-white/5 rounded-xl"></div>
                        <div class="h-10 bg-white/5 rounded-xl"></div>
                    </div>
                </div>

                <div class="mt-8 pt-6 border-t border-white/5">
                    <button class="w-full flex items-center justify-between text-xs font-bold uppercase text-gray-400 hover:text-[#00f2ff] transition-colors">
                        <span>Настройки VPS</span>
                        <i data-lucide="chevron-right" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button class="neon-glass p-4 flex flex-col items-center gap-2 hover:border-[#00f2ff]/30 transition-all group">
                    <i data-lucide="shield" class="w-6 h-6 text-[#00f2ff] group-hover:scale-110 transition-transform"></i>
                    <span class="text-[10px] font-bold uppercase text-gray-400">Update SSL</span>
                </button>
                <button class="neon-glass p-4 flex flex-col items-center gap-2 hover:border-[#00ff88]/30 transition-all group">
                    <i data-lucide="refresh-cw" class="w-6 h-6 text-[#00ff88] group-hover:rotate-180 transition-transform duration-500"></i>
                    <span class="text-[10px] font-bold uppercase text-gray-400">Self Update</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="space-y-6">
            <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                <div class="relative w-full sm:w-96">
                    <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 w-5 h-5"></i>
                    <input type="text" placeholder="Поиск сервисов..." class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-12 pr-4 outline-none focus:border-[#00f2ff]/50 focus:bg-white/10 transition-all font-medium placeholder:text-gray-600 shadow-xl">
                </div>

                <button class="flex items-center gap-2 px-8 py-4 bg-cyan-600 hover:bg-cyan-500 rounded-2xl font-black uppercase text-sm transition-all shadow-lg shadow-cyan-600/30 active:scale-95">
                    <i data-lucide="plus-circle" class="w-5 h-5"></i>
                    <span>Добавить сервис</span>
                </button>
            </header>

            <!-- Services Grid -->
            <div id="services-grid" hx-get="/api/services" hx-trigger="load, every 5s" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                <!-- Загрузка сервисов... -->
                <div class="neon-glass h-64 animate-pulse"></div>
                <div class="neon-glass h-64 animate-pulse"></div>
            </div>
        </main>
    </div>

    <!-- Рецепты для HTMX шаблонов (скрытые) -->
    <template id="service-card-template">
        <!-- Будет использоваться на бэкенде для генерации HTML -->
    </template>

    <script>
        document.body.addEventListener('htmx:afterOnLoad', function() {
            lucide.createIcons();
        });
        lucide.createIcons();
    </script>
</body>
</html>
