<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rProxy Dashboard | Zero-Dep Edition</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* ПРЕМИАЛЬНЫЙ ТЕМНЫЙ ДИЗАЙН БЕЗ ВНЕШНИХ CSS ФРЕЙМВОРКОВ */
        :root {
            --bg-color: #05070a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --neon-cyan: #00f2ff;
            --neon-emerald: #00ff88;
            --neon-purple: #bc13fe;
            --neon-red: #ff3e3e;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin:0; padding:0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(0, 242, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(188, 19, 254, 0.05) 0%, transparent 40%);
        }

        .container {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 30px;
        }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
        }

        /* GLASS CARD */
        .glass {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 24px;
            transition: var(--transition);
        }

        .glass:hover {
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
        }

        /* SIDEBAR STYLES */
        .sidebar { display: flex; flex-direction: column; gap: 20px; }
        .logo-box { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .logo-icon {
            width: 48px; height: 48px;
            background: rgba(0, 242, 255, 0.1);
            color: var(--neon-cyan);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
        }
        .logo-text h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
        .logo-text span { color: var(--neon-cyan); }
        .logo-tag { font-size: 10px; text-transform: uppercase; color: var(--text-dim); letter-spacing: 2px; }

        .stat-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; background: rgba(255,255,255,0.03);
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 10px;
        }
        .stat-label { font-size: 11px; text-transform: uppercase; color: var(--text-dim); font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .stat-value { font-family: monospace; font-weight: 700; font-size: 14px; }

        /* MAIN CONTENT STYLES */
        .main-col { display: flex; flex-direction: column; gap: 20px; }
        .header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 15px; }
        
        .search-box { position: relative; flex: 1; min-width: 250px; }
        .search-box input {
            width: 100%; background: var(--card-bg); border: 1px solid var(--card-border);
            border-radius: 15px; padding: 15px 15px 15px 45px; color: #fff; outline: none;
            transition: var(--transition);
        }
        .search-box input:focus { border-color: var(--neon-cyan); background: rgba(255,255,255,0.08); }
        .search-box i { position: absolute; left: 15px; top: 15px; color: var(--text-dim); }

        .btn-add {
            background: var(--neon-cyan); color: #000; border: none;
            padding: 15px 30px; border-radius: 15px; font-weight: 800;
            text-transform: uppercase; font-size: 13px; display: flex; align-items: center; gap: 10px;
            cursor: pointer; transition: var(--transition); box-shadow: 0 10px 20px rgba(0, 242, 255, 0.2);
        }
        .btn-add:hover { transform: translateY(-2px); box-shadow: 0 15px 25px rgba(0, 242, 255, 0.3); opacity: 0.9; }

        /* SERVICE CARDS GRID */
        .services-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px; width: 100%;
        }

        .svc-card { position: relative; overflow: hidden; }
        .svc-card::before {
            content: ''; position: absolute; top:0; left:0; width:100%; height:4px;
            background: var(--accent-color, var(--neon-purple));
        }
        .svc-card.online::before { --accent-color: var(--neon-emerald); }

        .svc-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .svc-info { display: flex; align-items: center; gap: 12px; }
        .svc-icon {
            width: 44px; height: 44px; background: rgba(255,255,255,0.05);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            color: var(--accent-color, var(--neon-purple));
        }
        .svc-name h3 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
        .svc-status { display: flex; align-items: center; gap: 6px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; }
        .status-dot.online { background: var(--neon-emerald); box-shadow: 0 0 10px var(--neon-emerald); }
        .status-dot.offline { background: var(--neon-red); }
        .status-text { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        .svc-details { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .detail-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px; background: rgba(0,0,0,0.2); border-radius: 10px;
        }
        .detail-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; font-weight: 700; display: flex; align-items: center; gap: 6px; }
        .detail-value { font-family: monospace; font-size: 13px; color: #fff; }

        .svc-actions {
            display: flex; gap: 8px; border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 15px;
        }
        .action-btn {
            flex: 1; padding: 12px; border: 1px solid rgba(255,255,255,0.05);
            background: rgba(255,255,255,0.03); border-radius: 10px; color: #fff;
            cursor: pointer; transition: var(--transition); display: flex; align-items: center; justify-content: center;
        }
        .action-btn:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }
        .action-btn.power { flex: 2; font-size: 10px; font-weight: 900; text-transform: uppercase; gap: 8px; }
        .action-btn.power.on:hover { border-color: var(--neon-emerald); color: var(--neon-emerald); }
        .action-btn.power.off:hover { border-color: var(--neon-red); color: var(--neon-red); }
        .action-btn.delete:hover { color: var(--neon-red); border-color: rgba(255,0,0,0.3); }

        /* LOADING ANIMATION */
        .pulse { animation: pulse 1.5s infinite ease-in-out; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 0.3; } 100% { opacity: 0.5; } }

        .custom-loader {
            grid-column: 1 / -1; height: 200px; display: flex; align-items: center;
            justify-content: center; flex-direction: column; gap: 15px; color: var(--text-dim);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="glass svc-card" style="--accent-color: var(--neon-cyan)">
                <div class="logo-box">
                    <div class="logo-icon"><i data-lucide="zap"></i></div>
                    <div class="logo-text">
                        <h1>rProxy <span>CORE</span></h1>
                        <p class="logo-tag">System Interface</p>
                    </div>
                </div>

                <div id="system-stats" hx-get="/api/system" hx-trigger="load, every 10s">
                    <div class="pulse">
                        <div class="stat-item"><div class="stat-label">Загрузка...</div></div>
                    </div>
                </div>

                <button class="action-btn" style="width: 100%; margin-top: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; gap: 10px;">
                    <i data-lucide="settings" style="width:14px"></i> Настройки VPS
                </button>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="glass" style="padding: 15px; display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer;">
                    <i data-lucide="shield" style="color: var(--neon-cyan)"></i>
                    <span style="font-size: 9px; font-weight: 800; text-transform: uppercase; color: var(--text-dim)">SSL Fix</span>
                </div>
                <div class="glass" style="padding: 15px; display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer;">
                    <i data-lucide="refresh-cw" style="color: var(--neon-emerald)"></i>
                    <span style="font-size: 9px; font-weight: 800; text-transform: uppercase; color: var(--text-dim)">Update</span>
                </div>
            </div>
        </aside>

        <!-- Main -->
        <main class="main-col">
            <div class="header-actions">
                <div class="search-box">
                    <i data-lucide="search"></i>
                    <input type="text" placeholder="Поиск активных туннелей...">
                </div>
                <button class="btn-add">
                    <i data-lucide="plus"></i> Добавить сервис
                </button>
            </div>

            <div id="services-grid" class="services-grid" hx-get="/api/services" hx-trigger="load, every 5s">
                <div class="custom-loader pulse">
                    <i data-lucide="loader-2" style="width: 40px; height: 40px;"></i>
                    <p>Синхронизация с rProxy...</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.body.addEventListener('htmx:afterOnLoad', function() {
            lucide.createIcons();
        });
        lucide.createIcons();
    </script>
</body>
</html>
