<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rProxy Login</title>
    <!-- Шрифты (в стиле AWG) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Поддержка тем как в основном приложении */
            --bg-color-from: #1e1b4b;
            --bg-color-to: #312e81;
            --bg-blobs-color: rgba(99, 102, 241, 0.15);
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --input-bg: rgba(0, 0, 0, 0.2);
            --input-border: rgba(255, 255, 255, 0.1);
            --input-focus: rgba(99, 102, 241, 0.5);
            --btn-bg: #4f46e5;
            --btn-hover: #4338ca;
            --btn-text: #ffffff;
            --error-color: #ef4444;
        }

        [data-theme="light"] {
            --bg-color-from: #f8fafc;
            --bg-color-to: #e2e8f0;
            --bg-blobs-color: rgba(99, 102, 241, 0.08);
            --card-bg: rgba(255, 255, 255, 0.7);
            --card-border: rgba(255, 255, 255, 0.5);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --input-bg: rgba(255, 255, 255, 0.9);
            --input-border: rgba(0, 0, 0, 0.1);
            --input-focus: rgba(99, 102, 241, 0.3);
            --btn-bg: #4f46e5;
            --btn-hover: #4338ca;
            --btn-text: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg-color-from), var(--bg-color-to)) fixed;
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            transition: background 0.3s ease;
        }

        /* Glassmorphism декорации */
        body::before, body::after {
            content: '';
            position: absolute;
            background: var(--bg-blobs-color);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            transition: all 0.5s ease;
        }
        body::before {
            width: 400px;
            height: 400px;
            top: -100px;
            left: -100px;
        }
        body::after {
            width: 500px;
            height: 500px;
            bottom: -150px;
            right: -100px;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            margin: 1rem;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            box-sizing: border-box;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-placeholder {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--btn-bg);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4);
        }

        .logo-icon svg {
            width: 24px;
            height: 24px;
            fill: #fff;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 10px;
            color: var(--text-main);
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--input-focus);
            box-shadow: 0 0 0 3px var(--input-focus);
        }

        button.btn-primary {
            width: 100%;
            padding: 0.875rem 1rem;
            background: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        button.btn-primary:hover {
            background: var(--btn-hover);
        }

        button.btn-primary:active {
            transform: scale(0.98);
        }

        .error-message {
            color: var(--error-color);
            background: rgba(239, 68, 68, 0.1);
            border-radius: 8px;
            padding: 0.75rem;
            font-size: 0.875rem;
            margin-bottom: 1rem;
            display: none;
            text-align: center;
        }

        /* Анимация загрузки на кнопке */
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading .spinner { display: block; }
        .loading .btn-text { display: none; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-placeholder">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M16 11V7a4 4 0 00-8 0v4H6v10h12V11h-2zm-6-4a2 2 0 114 0v4h-4V7z"/>
                </svg>
            </div>
            rProxy
        </div>

        <div id="error-msg" class="error-message">Неверный логин или пароль</div>

        <form id="login-form">
            <div class="form-group">
                <label for="login">Пользователь</label>
                <input type="text" id="login" name="login" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" placeholder="Введите пароль..." required>
            </div>
            <button type="submit" class="btn-primary" id="login-btn">
                <span class="btn-text">Войти</span>
                <span class="spinner"></span>
            </button>
        </form>
    </div>

    <script>
        // Восстановление темы из localStorage (чтобы совпадало с основным UI)
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const errorMsg = document.getElementById('error-msg');
            const loginVal = document.getElementById('login').value;
            const passVal = document.getElementById('password').value;

            btn.classList.add('loading');
            btn.disabled = true;
            errorMsg.style.display = 'none';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ login: loginVal, password: passVal })
                });

                if (!res.ok) {
                    throw new Error('Server error');
                }

                const data = await res.json();
                
                if (data.status === 'success') {
                    // Успешный вход, перебрасываем на главную
                    window.location.href = '/';
                } else {
                    errorMsg.textContent = data.message || 'Ошибка авторизации';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'Ошибка сети';
                errorMsg.style.display = 'block';
            } finally {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
